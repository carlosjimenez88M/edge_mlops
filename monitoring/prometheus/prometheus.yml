global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # Metricas de la API de inferencia.
  - job_name: edge-api
    static_configs:
      - targets: ["api:8000"]

  # Auto-monitoreo de Prometheus.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
