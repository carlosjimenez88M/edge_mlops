# Capítulo 3 — Clasificación (MNIST).
# Disparo MANUAL desde Actions. Reutiliza el pipeline y lo apunta a chapter-03.
name: "Capítulo 3 · MLOps (MNIST)"

on:
  workflow_dispatch:
    inputs:
      run_sweep:
        description: "Activar el sweep de W&B (60 intentos)"
        type: boolean
        default: false

concurrency:
  group: chapter-03
  cancel-in-progress: true

jobs:
  run:
    uses: ./.github/workflows/_pipeline.yml
    with:
      chapter_ref: chapter-03
      run_sweep: ${{ inputs.run_sweep }}
    secrets: inherit
