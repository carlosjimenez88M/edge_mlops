# =============================================================================
# Configuracion de la corrida MLOps (unica fuente de verdad).
# Validada por src/common/config.py (Pydantic). Si algo falta -> falla en rojo.
#
# CAPITULO 3 de Geron: Clasificacion sobre MNIST (reconocimiento de digitos).
# =============================================================================

project:
  name: edge-mlops
  chapter: "03"
  experiment_name: chapter-03-mnist
  task: classification
  random_state: 42

mlflow:
  # El Model Registry de MLflow necesita backend con BD (no file://).
  tracking_uri: sqlite:///mlflow.db
  registered_model_name: mnist-digit-classifier

data:
  source: openml_mnist
  target: class
  test_size: 0.2
  raw_path: data/raw/mnist.parquet
  # Submuestreo: 70k imagenes son demasiado para la Pi. 10k da buen balance
  # velocidad/exactitud. Pon null para usar el MNIST completo.
  sample_size: 10000

validation:
  drift_threshold: 0.05
  reference_fraction: 0.5
  report_path: artifacts/validation_report.json

preprocessing:
  numeric_strategy: median
  add_engineered_features: false   # las imagenes no llevan feature engineering
  processed_dir: data/processed

competition:
  metric: accuracy                 # mas es mejor
  cv_folds: 3                      # 3 folds para ir mas rapido en la Pi
  models:
    - sgd_classifier
    - random_forest
    - logistic_regression

sweep:
  enabled: false                   # actívalo con --enable-sweep o el input del Action
  project: edge-mlops-mnist
  entity: null
  count: 60                        # exactamente 60 intentos
  method: bayes
  metric:
    name: val_accuracy
    goal: maximize

register:
  promote: true
  stage: Staging
  gate_metric: accuracy            # gate de calidad generico
  gate_min: 0.90

orchestrator:
  env_manager: local
  steps:
    - data_load
    - data_validation
    - data_preprocessing
    - model_competition
    - sweep
    - register

api:
  host: 0.0.0.0
  port: 8000
  model_uri: models:/mnist-digit-classifier/Staging
